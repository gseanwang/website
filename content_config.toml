# ── Personal Info ─────────────────────────────────────────────────────────────
[personal]
full_name        = "Chun-Hsiang (Sean) Wang"
preferred_name   = "Sean Wang"
title            = "Ph.D. Candidate in Plant Pathology"
institution      = "University of Florida"
department       = "Department of Plant Pathology"
location         = "Gainesville, FL 32611, USA"
email            = "c.wang@ufl.edu"
linkedin         = "https://linkedin.com/in/seanwang-plantpath"
google_scholar   = "https://scholar.google.com/citations?user=YOURID"
twitter          = "https://twitter.com/SeanWang_PlantPath"
uf_page          = "https://plantpath.ifas.ufl.edu"
cv_filename      = "Sean_Wang_CV.pdf"         # place file in /assets/
profile_photo    = "profile.jpg"              # place file in /assets/  (optional)

# ── Bio Paragraph ─────────────────────────────────────────────────────────────
[bio]
summary = """
I am a Ph.D. candidate in the Department of Plant Pathology at the University of Florida,
where my research sits at the intersection of fungal epidemiology, integrated pest management
(IPM), and sustainable agricultural systems. My dissertation investigates the epidemiological
dynamics of soilborne and foliar fungal pathogens in specialty crops, with a focus on
developing science-based management protocols that reduce synthetic fungicide inputs while
maintaining economic viability for growers.
"""

