[bio]
summary = """
Ph.D. Candidate in Plant Pathology specializing in **fungal epidemiology**, **seed pathology**,
**IPM**, and **sustainable agriculture** within complex cropping systems, including
Corn–Peanut–Carrot rotations at the University of Florida (Advisor: Dr. Mathews Paret).

Proven expertise in managing large-scale (~3-acre) field trials using Completely Randomized Design (CRD),
delivering research outcomes that directly inform management protocols for **~50,000 acres** of commercial
carrot production nationally (Grimmway Farms).

Advanced technical proficiency in ISTA protocols, multi-locus phylogenetic analyses (ITS, GAPDH, Alt a 1),
UAV-based multispectral imaging (NDVI/NDRE), and Python/R/SAS for 4PL EC₅₀ dose-response modeling.

Collaborative researcher with a track record of securing **~$48,000** in international grant funding,
mentoring **7 junior scientists** across three institutions (UF, MOA, NTU), and translating complex
findings into actionable grower protocols through on-farm extension.
"""

